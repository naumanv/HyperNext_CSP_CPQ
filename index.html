<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperNext CSP — Cloud Capacity Planner</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ═══════════════ AUTH OVERLAY ═══════════════ -->
<div id="authOverlay" class="auth-overlay">
    <div id="authBox" class="auth-box"></div>
</div>

<!-- ═══════════════ SAVE MODAL ═══════════════ -->
<div id="saveModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Save Configuration to Cloud</h3>
            <button class="btn-icon" onclick="closeSaveModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="form-group">
            <label class="form-label">Configuration Name</label>
            <input class="form-input" id="configName" placeholder="e.g. Production AZ1" value="Default Configuration">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Region</label>
                <input class="form-input" id="configRegion" placeholder="Region 1" value="Region 1">
            </div>
            <div class="form-group">
                <label class="form-label">Availability Zone</label>
                <input class="form-input" id="configAZ" placeholder="AZ1" value="AZ1">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeSaveModal()">Cancel</button>
            <button class="btn btn-primary" onclick="confirmSave()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save to Cloud
            </button>
        </div>
    </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div class="app-container" id="appContainer" style="display:none">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">H</span>
                <span class="logo-text">HyperNext<span class="logo-sub">CSP Edition</span></span>
            </div>
        </div>
        <ul class="nav-menu" id="navMenu"></ul>
        <div class="sidebar-footer">
            <div class="version-badge">v2.2</div>
            <span>Powered by iVolve Technologies</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
            <div class="top-actions">
                <button class="btn btn-outline btn-sm" id="exportBtn" title="Export JSON">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export
                </button>
                <button class="btn btn-primary btn-sm" id="saveBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save
                </button>
                <!-- User Badge -->
                <div class="user-badge" id="userBadge" style="display:none">
                    <div class="user-avatar" id="userAvatar">C</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">CSP User</div>
                        <div class="user-role" id="userRole">Essential</div>
                    </div>
                    <div class="user-menu-trigger" onclick="toggleUserMenu()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="user-dropdown-item" onclick="navigateTo('profile')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            My Profile
                        </div>
                        <div class="user-dropdown-item" onclick="openSaveModal()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/></svg>
                            Save Config
                        </div>
                        <div class="user-dropdown-divider"></div>
                        <div class="user-dropdown-item danger" onclick="handleLogout()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Sign Out
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-area" id="contentArea"></div>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Scripts: order matters -->
<script src="supabase.js"></script>
<script src="app.js"></script>
<script src="auth-pages.js"></script>
<script src="main.js"></script>
</body>
</html>
